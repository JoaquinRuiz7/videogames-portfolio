apiVersion: apps/v1
kind: Deployment
metadata:
  name: videogames-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: videogames-frontend
  template:
    metadata:
      labels:
        app: videogames-frontend
    spec:
      containers:
        - name: videogames-frontend
          image: videogames-frontend:3.0
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: videogames-frontend-secret


