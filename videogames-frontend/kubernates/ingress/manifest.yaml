apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: videogames-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: videogames.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: videogames-frontend-service
                port:
                  number: 80