<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 120 120"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">GameScope icon</title>
  <desc id="desc">Orange rounded square with a radar and spark</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb347" />
      <stop offset="45%" stop-color="#ff8f1f" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>
    <radialGradient id="screenGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3f3f3f" />
      <stop offset="70%" stop-color="#262626" />
      <stop offset="100%" stop-color="#181818" />
    </radialGradient>
    <linearGradient id="needleGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6b400" />
      <stop offset="100%" stop-color="#ffd54f" />
    </linearGradient>
  </defs>

  <rect x="7" y="7" width="106" height="106" rx="20" fill="url(#bgGrad)" />
  <rect
    x="7"
    y="7"
    width="106"
    height="106"
    rx="20"
    fill="none"
    stroke="#f5a236"
    stroke-width="2"
  />
  <circle cx="94" cy="26" r="7" fill="#ffd64a" opacity="0.95" />

  <circle cx="60" cy="60" r="38" fill="url(#screenGrad)" stroke="#5e5e5e" stroke-width="3" />
  <circle cx="60" cy="60" r="30" fill="none" stroke="#5f5f5f" stroke-width="1.8" opacity="0.75" />
  <circle cx="60" cy="60" r="18" fill="none" stroke="#565656" stroke-width="1.5" opacity="0.65" />

  <path d="M22 60h76M60 22v76" stroke="#626262" stroke-width="1.8" opacity="0.8" />
  <path d="M60 60L84 36" stroke="url(#needleGrad)" stroke-width="7" stroke-linecap="round" />
  <circle cx="60" cy="60" r="6.5" fill="#ffbf00" stroke="#6f5400" stroke-width="1" />
  <circle cx="82" cy="76" r="4.5" fill="#fcb321" />
  <circle cx="93" cy="72" r="2.2" fill="#f9a21a" />
</svg>
